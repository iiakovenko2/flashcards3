<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათემატიკის ბარათები</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      
    <div class="header-container" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; box-sizing: border-box; width: 100%;">
    
    <button id="menu-toggle-btn" onclick="toggleSidebar(true)" style="background: none; border: none; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; margin-right: 10px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-primary, #2c3e50);">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <h1 class="app-title" style="margin: 0; font-size: 1.8rem; text-align: center; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">მათემატიკის ბარათები</h1>
    
    
</div>

<div id="sidebar-overlay" onclick="toggleSidebar(false)" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 9999; opacity: 0; transition: opacity 0.3s ease;"></div>

<div id="sidebar-menu" style="position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; height: -webkit-fill-available; background-color: var(--bg-card, #ffffff); border-right: 1px solid var(--border-color, #e2e8f0); box-shadow: 4px 0 15px rgba(0,0,0,0.15); z-index: 10000; transition: left 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color, #e2e8f0); padding-bottom: 15px;">
    <span style="font-weight: bold; font-size: 1.2rem; color: var(--text-primary);">მენიუ</span>
    
    <div class="theme-slider-container">
        <div class="theme-slider-thumb" id="theme-slider-thumb"></div>
        
        <button class="theme-slider-node" onclick="setAppTheme('light')" title="Light Mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>
        </button>
        
        <button class="theme-slider-node" onclick="setAppTheme('system')" title="System Default">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/><path d="M22 22H2M16 14H8a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4z"/></svg>
        </button>

        <button class="theme-slider-node" onclick="setAppTheme('dark')" title="Dark Mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>

    <button onclick="toggleSidebar(false)" style="background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-primary); padding: 5px;">✕</button>
</div>

    <nav style="display: flex; flex-direction: column; gap: 12px; flex-grow: 1;">
        <button onclick="handleSidebarAction('test')" class="menu-item-btn" style="display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 15px; border: none; border-radius: 12px; background-color: #4a90e2; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; text-align: left; box-sizing: border-box;">
            <span style="font-size: 1.15rem;">⏱️</span> შერეული ტესტირება
        </button>

        <button onclick="handleSidebarAction('bookmarks')" class="menu-item-btn secondary" style="display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 15px; border: none; border-radius: 12px; background-color: transparent; color: var(--text-primary); font-weight: 500; font-size: 1rem; cursor: pointer; text-align: left; box-sizing: border-box; ">
            <span style="font-size: 1.15rem;">⭐</span> სანიშნეები
        </button>
    </nav>

    <div style="font-size: 0.8rem; text-align: center; color: #a0aec0; padding-top: 15px; border-top: 1px solid var(--border-color, #e2e8f0);">
        ვერსია 1.1.0
    </div>
</div>
    
    <div class="search-container">
        <input type="text" id="app-search" placeholder="მოძებნე საკითხი..." onkeyup="handleSearch()">
    </div>

    <div class="top-nav-bar" style="max-width: 600px; margin: 0 auto 15px auto; padding: 0 10px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;">
       
        </div>

    <div id="menu" class="menu-container">
        
    </div>

    <div id="player">
        <button id="back-to-search-btn" class="back-to-search-btn search-back" onclick="backToSearch()" style="display:none;">← ძიების შედეგები</button>
        
        <h2 id="category-title"></h2>
        
        <div class="button-row">
            <button class="home-btn" onclick="goHome()" aria-label="მთავარი მენიუ">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
           
            <button id="help-btn" class="action-chip theory-btn" onclick="openTheory(event)" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <span></span>
            </button>

            <button id="task-btn" class="action-chip task-btn" onclick="openTask(event)" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                <span></span>
            </button>
        </div>

        <div class="flashcard"> 
            
            <div class="flashcard-inner">
                <div class="front">
                    <button id="bookmark-btn" class="action-chip bookmark-btn" onclick="toggleCurrentBookmark(event)" >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" id="bookmark-star-svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        <span id="bookmark-text">შენახვა</span>
    </button>
                    <div id="q-text-content"></div>
                    <div id="jxgbox" class="jxgbox" style="width: 280px; height: 280px; margin: 10px auto; display: block; background: white;"></div>
                </div>
                <div class="back" id="a-text">პასუხი</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">წინა</button>
            <span id="progress">1 / 1</span>
            <button onclick="nextCard()">შემდეგი</button>
        </div>
    </div>
    
    <div id="test-player" style="display: none; padding: 20px; max-width: 600px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="exitTest()" class="action-chip" style="background-color: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold;">✕ ტესტის შეწყვეტა</button>
            <div id="test-timer" style="font-size: 1.25rem; font-weight: bold; font-family: monospace; color: #ef4444;">⏱️ 15:00</div>
        </div>
        
        <div style="width: 100%; height: 6px; background-color: var(--border-color, #e2e8f0); border-radius: 3px; margin-bottom: 20px; overflow: hidden;">
            <div id="test-progress-bar" style="width: 0%; height: 100%; background-color: #4a90e2; transition: width 0.3s ease;"></div>
        </div>
        <div id="test-progress-text" style="font-weight: 500; margin-bottom: 15px; color: var(--text-primary);">კითხვა: 1 / 10</div>

        <div id="test-question-text" class="math-question-text" style="margin-bottom: 25px; font-size: 1.2rem; min-height: 80px; color: var(--text-primary); line-height: 1.5;">
            </div>

        <div id="test-options" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px;">
            </div>

        <button id="test-next-btn" class="category-btn" style="width: 100%; display: none; padding: 15px; background-color: #4a90e2; color: white; font-weight: bold; border: none; border-radius: 12px; cursor: pointer;" onclick="nextTestQuestion()">
            შემდეგი კითხვა ➔
        </button>
    </div>

    <div id="test-results" style="display: none; padding: 30px; text-align: center; max-width: 500px; margin: 0 auto;">
        <div style="font-size: 4rem; margin-bottom: 15px;">📊</div>
        <h2 style="color: var(--text-primary); margin-bottom: 10px;">ტესტირების შედეგი</h2>
        
        <div style="background-color: rgba(74, 144, 226, 0.1); padding: 20px; border-radius: 12px; margin-bottom: 25px;">
            <p style="font-size: 1.5rem; font-weight: bold; color: #4a90e2; margin: 0 0 10px 0;" id="results-score">სწორი პასუხები: 0 / 10</p>
            <p style="font-size: 1rem; color: var(--text-primary); margin: 0;" id="results-time">დრო: 00:00</p>
        </div>

        <button onclick="goHomeFromTest()" class="category-btn" style="width: 100%; padding: 15px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; background-color: #4a90e2; color: white;">
            მთავარ მენიუში დაბრუნება
        </button>
    </div>

    <div id="theory-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeTheory()">&times;</span>
            <h3 style="margin-top:0;">თეორიული ცნობა</h3>
            <hr>
            <div id="help-text-modal"></div>
        </div>
    </div>
  <div id="app-alert-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px; text-align: center; border-top: 5px solid #ef4444;">
        <h3 id="app-alert-title" style="margin-top:0; color: var(--text-primary);">შეტყობინება</h3>
        <hr>
        <div id="app-alert-text" style="margin: 20px 0; color: var(--text-primary); font-size: 1.1rem;"></div>
        <button onclick="closeAppAlert()" class="category-btn" style="padding: 10px 25px; background-color: #4a90e2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
            გასაგებია
        </button>
    </div>
</div>
    <div id="task-modal" class="modal">
        <div class="modal-content" style="border-top: 5px solid #27ae60;">
            <span class="close-btn" onclick="closeTask()">&times;</span>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0; color: #27ae60;">📝 ამოცანა <span id="task-number">1/1</span></h3>
            </div>
            <hr>
            
            <div id="task-main-content">
                <div id="task-text-modal" style="min-height: 80px; margin-top: 15px;"></div>
                
                <div class="task-hint-container" style="margin: 15px 0;">
                    <button id="hint-btn" class="hint-button" onclick="toggleHint()" style="display:none;">
                        <span class="hint-icon">💡</span> მინიშნება
                    </button>
                    <div id="task-hint-text" class="hint-text" style="display:none;"></div>
                </div>
                <div id="task-answer-wrapper" style="margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
                    <button id="show-task-answer-btn" onclick="toggleTaskAnswer()" class="ans-btn">პასუხის ნახვა</button>
                    <div id="task-answer-text" style="display:none; margin-top: 10px; font-weight: bold;"></div>
                </div>
            </div>
            <div id="task-nav-controls" style="display: flex; justify-content: space-between; margin-top: 25px;">
                <button onclick="changeTask(-1)" class="nav-btn">← წინა</button>
                <button onclick="changeTask(1)" class="nav-btn">შემდეგი →</button>
            </div>
        </div>
    </div>   
<header>
    
    <div id="stat-counter" class="stats-container">ითვლება...</div>
</header>
    <script src="script.js"></script>
    <script> 
        function handleSearch() {
            const query = document.getElementById('app-search').value.toLowerCase();
            const menuContainer = document.getElementById('menu');
            const searchBackBtn = document.getElementById('back-to-search-btn');
            
            if (query.trim() === "") {
                if (searchBackBtn) searchBackBtn.style.display = "none";
                menuContainer.style.display = "grid";
                menuContainer.classList.remove('searching');
                createCategoryMenu();
                return;
            }

            menuContainer.style.display = "flex";
            menuContainer.style.flexDirection = "column";
            menuContainer.style.alignItems = "center";
            menuContainer.classList.add('searching');
            menuContainer.innerHTML = ""; 

            let resultsFound = false;

            Object.keys(data).forEach(category => {
                const cards = Array.isArray(data[category]) ? data[category] : data[category].cards;
                
                const filtered = cards.filter(card => 
                    card.q.toLowerCase().includes(query) || 
                    (card.help && card.help.toLowerCase().includes(query))
                );

                if (filtered.length > 0) {
                    resultsFound = true;
                    filtered.forEach(card => {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        
                        let previewText = card.q.slice(0, 150);
                        if (card.q.length > 150) previewText += "...";

                        div.innerHTML = `
                            <span class="search-category-label">${category}</span>
                            <div class="search-question-preview">${previewText}</div>
                        `;
                        
                        div.onclick = () => {
                            currentStack = [card];
                            currentIndex = 0;
                            if (searchBackBtn) searchBackBtn.style.display = 'inline-block';
                            startSearchCard(category);
                        };
                        menuContainer.appendChild(div);
                    });
                }
            });

            if (!resultsFound) {
                menuContainer.innerHTML = "<div class='search-result-item'>შედეგი ვერ მოიძებნა...</div>";
            } else {
                renderMathInElement(menuContainer, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        function backToSearch() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            handleSearch(); 
        }

        function startSearchCard(categoryName) {
            document.getElementById('category-title').innerText = categoryName;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('player').style.display = 'block';
            updateCard();
        }
    </script>
</body>
</html>
